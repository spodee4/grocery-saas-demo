<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background rounded square -->
  <rect width="40" height="40" rx="10" fill="#3b82f6" fill-opacity="0.15"/>
  <!-- Bar chart bars -->
  <rect x="7" y="20" width="5" height="13" rx="1.5" fill="#3b82f6" opacity="0.5"/>
  <rect x="14" y="14" width="5" height="19" rx="1.5" fill="#3b82f6" opacity="0.75"/>
  <rect x="21" y="8" width="5" height="25" rx="1.5" fill="#3b82f6"/>
  <!-- Trend line over bars -->
  <polyline points="9.5,20 16.5,13 23.5,8 30,12" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Dot at end of trend -->
  <circle cx="30" cy="12" r="2.5" fill="#60a5fa"/>
  <!-- Dollar sign -->
  <text x="29" y="30" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#3b82f6" text-anchor="middle">$</text>
</svg>
